<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Vital Chat Health</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet">
</head>
<body class="auth-page">
    <header class="navbar">
        <a href="index.html" class="logo">
            <i class='bx bx-pulse'></i> Vital Chat
        </a>
        <nav class="nav-links">
            <a href="index.html">Home</a>
            <a href="clinics.html">Find Clinics</a>
            <a href="appointment.html">Book Care</a>
        </nav>
        <div class="nav-actions">
            <a href="login.html" class="btn-outline">Sign In</a>
            <a href="register.html" class="btn-primary">Register</a>
        </div>
    </header>

    <div class="auth-container">
        <div class="auth-card">
            <h2>Create an Account</h2>
            <p>Join Vital Chat Health</p>

            <form id="registerForm">
                <div id="server-error">Error. Please try again.</div>

                <div class="form-group">
                    <label for="full_name">Full Name</label>
                    <input type="text" id="full_name" name="full_name" required placeholder="John Doe">
                    <div class="error-msg" id="nameError">Please enter your full name (min 2 characters)</div>
                </div>

                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" name="email" required placeholder="you@example.com">
                    <div class="error-msg" id="emailError">Please enter a valid email</div>
                </div>

                <div class="form-group">
                    <label for="phone">Phone Number</label>
                    <input type="tel" id="phone" name="phone" placeholder="+91 98765 43210">
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" required placeholder="••••••••">
                    <div class="error-msg" id="passwordError">Password must be at least 8 characters</div>
                </div>

                <div class="form-group">
                    <label for="confirm_password">Confirm Password</label>
                    <input type="password" id="confirm_password" name="confirm_password" required placeholder="••••••••">
                    <div class="error-msg" id="confirmError">Passwords do not match</div>
                </div>

                <button type="submit" class="btn-primary auth-btn">Register</button>
            </form>

            <div class="auth-footer">
                Already have an account? <a href="login.html">Sign In</a>
            </div>
        </div>
    </div>

    <script type="module" src="js/firebase.js"></script>
    <script type="module" src="js/auth.js"></script>
</body>
</html>
