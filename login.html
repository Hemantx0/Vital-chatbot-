<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In - Vital Chat Health</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet">
</head>
<body class="auth-page">
    <header class="navbar">
        <a href="index.html" class="logo">
            <i class='bx bx-pulse'></i> Vital Chat
        </a>
        <nav class="nav-links">
            <a href="index.html">Home</a>
            <a href="clinics.html">Find Clinics</a>
            <a href="appointment.html">Book Care</a>
        </nav>
        <div class="nav-actions">
            <a href="login.html" class="btn-outline">Sign In</a>
            <a href="register.html" class="btn-primary">Register</a>
        </div>
    </header>

    <div class="auth-container">
        <div class="auth-card">
            <h2>Welcome Back</h2>
            <p>Sign in to your patient dashboard</p>

            <form id="loginForm">
                <div id="server-error">Invalid credentials.</div>
                <div id="server-success">Registration successful. Please sign in.</div>

                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" name="email" required placeholder="you@example.com">
                    <div class="error-msg" id="emailError">Please enter a valid email</div>
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" required placeholder="••••••••">
                    <div class="error-msg" id="passwordError">Password is required</div>
                </div>

                <button type="submit" class="btn-primary auth-btn">Sign In</button>
            </form>

            <div class="auth-footer">
                Don't have an account? <a href="register.html">Register</a>
            </div>
        </div>
    </div>

    <script type="module" src="js/firebase.js"></script>
    <script type="module" src="js/auth.js"></script>
    <script type="module">
        import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
        import { auth } from "./js/firebase.js";

        // If already logged in, redirect to dashboard
        onAuthStateChanged(auth, (user) => {
            if (user) window.location.href = "dashboard.html";
        });

        // Show success message if redirected from register
        const urlParams = new URLSearchParams(window.location.search);
        if (urlParams.get('registered')) {
            document.getElementById('server-success').style.display = 'block';
        }
    </script>
</body>
</html>
